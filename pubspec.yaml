name: waka
description: "Navigate Abuja, the local way."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # storage
  hive_flutter: ^1.1.0

  # gemini
  google_generative_ai: ^0.4.6

  # maps
  flutter_map: ^7.0.1
  latlong2: ^0.9.0

  # navigation
  go_router: ^14.0.0

  # state management
  flutter_riverpod: ^2.6.1

  # http (for nominatim geocoding)
  http: ^1.2.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  analyzer: ^6.4.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: fonts/SpaceGrotesk-Bold.ttf
          weight: 700